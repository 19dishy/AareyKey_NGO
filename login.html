<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login | AAREY KEY</title>
  <link rel="stylesheet" href="login.css">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>

  <div class="login-container">

    <div class="login-card">

      <div class="logo-circle">
        <a href="index.html">
          <img src="images/logo.png" alt="Logo" class="logo-img">
        </a>
      </div>
      
      <h2>Welcome</h2>
      <p class="subtitle">Please enter your detail to sign in.</p>

     <div class="role-selection">

  <a href="admin.html" class="role-card">
    <img src="images/admin.jpg" alt="Admin" class="role-icon">
    <span>Admin</span>
  </a>

  <a href="volunteer.html" class="role-card">
    <img src="images/volunteer.png" alt="Volunteer" class="role-icon">
    <span>Volunteer</span>
  </a>

</div>

<div class="divider">OR</div>

      <form>
        <label>E-Mail Address</label>
        <input type="email" placeholder="Enter your email..." required>

        <label>Password</label>
        <div class="password-wrapper">
          <input type="password" placeholder="Password@123" required>
        </div>

        <div class="options">
          <label>
            <input type="checkbox"> Remember me
          </label>
          <a href="#">Forgot password?</a>
        </div>

        <button type="submit" class="signin-btn">Sign in</button>

        <p class="signup-text">
          Don't have an account yet?
          <a href="signup.html">Sign up</a>
        </p>

      </form>

    </div>

  </div>

</body>
</html>
