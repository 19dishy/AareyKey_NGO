<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Sign Up | AAREY KEY</title>
  <link rel="stylesheet" href="signup.css">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>

  <div class="login-container">

    <div class="login-card">
     
      <div class="logo-circle">
        <a href="index.html">
          <img src="images/logo.png" alt="Logo" class="logo-img">
        </a>
      </div>


      <h2>Create Account</h2>
      <p class="subtitle">Please fill in the details to sign up.</p>

      <div class="social-login">
        <button class="social-btn">
          <img src="images/apple.png" alt="Apple" style="width:16px;height:16px;">
        </button>
        <button class="social-btn">G</button>
        <button class="social-btn">in</button>
      </div>

      <div class="divider">OR</div>
<form>

  <div class="form-group">
    <label>Full Name</label>
    <input type="text" placeholder="Enter your full name..." required>
  </div>

  <div class="form-group">
    <label>Contact Number</label>
    <input type="tel" placeholder="Enter your contact number..." required>
  </div>

  <div class="form-group">
    <label>E-Mail Address</label>
    <input type="email" placeholder="Enter your email..." required>
  </div>

  <div class="form-group">
    <label>Password</label>
    <div class="password-wrapper">
      <input type="password" placeholder="Password@123" required>
    </div>
  </div>

  <button type="submit" class="signin-btn">Create Account</button>

  <p class="signup-text">
    Already have an account? 
    <a href="login.html">Sign in</a>
  </p>

</form>

    </div>

  </div>

</body>
</html>
